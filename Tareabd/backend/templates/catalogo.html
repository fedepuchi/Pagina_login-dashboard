{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h1>{{ titulo }}</h1>

<table class="data-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>{{ columna }}</th>
        </tr>
    </thead>
    <tbody>
        {% for fila in filas %}
        <tr>
            <td>{{ fila.id }}</td>
            <td>{{ fila.nombre }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2">No hay registros.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
